<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gyro Parallax Demo — Ильдар &amp; Екатерина</title>
<style>
  @font-face {
    font-family: 'Cormorant Garamond';
    font-style: normal;
    font-weight: 300;
    src: url('/fonts/CormorantGaramond-Light.woff') format('woff');
  }
  @font-face {
    font-family: 'Anastasia Script';
    font-style: normal;
    font-weight: 400;
    src: url('/fonts/anastasiascript.woff') format('woff');
  }

  *, *::before, *::after {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  html, body {
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: #1a1512;
  }

  /* ── Hero container ─────────────────────────────────────────── */
  .hero {
    position: relative;
    width: 100vw;
    height: 100vh;
    overflow: hidden;
  }

  /* ── Image layers ───────────────────────────────────────────── */
  .layer {
    position: absolute;
    /* oversized so translation never exposes edges */
    top: -8%;
    left: -8%;
    width: 116%;
    height: 116%;
    will-change: transform;
  }

  .layer img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }

  /* BACK layer — blurred, darker, moves MORE */
  .layer-back img {
    object-position: 52% 50%;
    filter: blur(10px) brightness(0.9);
    transform: scale(1.35);
    transform-origin: center center;
  }

  /* FRONT layer — sharp, slightly scaled, couples are center-right */
  .layer-front img {
    object-position: 52% 50%;
    transform: scale(1.08);
    transform-origin: center center;
  }

  /* ── Vignette overlay ───────────────────────────────────────── */
  .vignette {
    position: absolute;
    inset: 0;
    pointer-events: none;
    z-index: 10;
    background:
      /* bottom fade for text readability */
      linear-gradient(
        to top,
        rgba(10, 8, 6, 0.55) 0%,
        rgba(10, 8, 6, 0.15) 35%,
        transparent 60%
      ),
      /* top fade */
      linear-gradient(
        to bottom,
        rgba(10, 8, 6, 0.38) 0%,
        transparent 30%
      ),
      /* radial vignette edges */
      radial-gradient(
        ellipse 130% 100% at 50% 50%,
        transparent 45%,
        rgba(5, 4, 3, 0.6) 100%
      );
  }

  /* ── Hero text ──────────────────────────────────────────────── */
  .hero-text {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    z-index: 20;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding-top: 10vh;
    color: #fff;
    text-align: center;
    will-change: transform;
    pointer-events: none;
  }

  .name {
    font-family: 'Cormorant Garamond', 'Georgia', serif;
    font-weight: 300;
    font-size: clamp(2.3rem, 12vw, 4.3rem);
    letter-spacing: 0.18em;
    text-transform: uppercase;
    line-height: 1.1;
    text-shadow: 0 2px 26px rgba(15, 25, 35, 0.32);
  }

  .ampersand {
    font-family: 'Anastasia Script', cursive;
    font-size: 0.7em;
    line-height: 1.3;
    opacity: 0.92;
    text-shadow: 0 2px 26px rgba(15, 25, 35, 0.32);
    /* relative to .name via em; keep it inside .hero-text */
    font-size: clamp(1.6rem, 8.4vw, 3.0rem);
    margin: 0.05em 0;
  }

  /* divider with heart */
  .divider {
    display: flex;
    align-items: center;
    gap: 0.7em;
    margin: clamp(0.7rem, 2.5vw, 1.2rem) 0 clamp(0.5rem, 2vw, 1rem);
    width: clamp(140px, 38vw, 280px);
  }

  .divider-line {
    flex: 1;
    height: 1px;
    background: rgba(255, 255, 255, 0.55);
  }

  .divider-heart {
    font-size: 0.7rem;
    opacity: 0.7;
    line-height: 1;
  }

  .date {
    font-family: 'Anastasia Script', cursive;
    font-size: clamp(1.1rem, 4.5vw, 1.7rem);
    opacity: 0.9;
    text-shadow: 0 2px 26px rgba(15, 25, 35, 0.32);
    letter-spacing: 0.04em;
  }

  /* ── Permission button (iOS) ────────────────────────────────── */
  #gyro-btn {
    position: fixed;
    z-index: 100;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    padding: 14px 28px;
    background: rgba(255, 255, 255, 0.15);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border: 1px solid rgba(255, 255, 255, 0.4);
    border-radius: 40px;
    color: #fff;
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.1rem;
    letter-spacing: 0.08em;
    cursor: pointer;
    display: none; /* shown only when needed */
    transition: background 0.2s, transform 0.2s;
  }
  #gyro-btn:hover {
    background: rgba(255, 255, 255, 0.25);
    transform: translate(-50%, -50%) scale(1.04);
  }

  /* ── Demo badge ─────────────────────────────────────────────── */
  .demo-badge {
    position: fixed;
    bottom: 16px;
    right: 16px;
    z-index: 200;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    font-size: 0.67rem;
    letter-spacing: 0.04em;
    color: rgba(255, 255, 255, 0.55);
    background: rgba(0, 0, 0, 0.35);
    padding: 5px 9px;
    border-radius: 6px;
    pointer-events: none;
    backdrop-filter: blur(4px);
    -webkit-backdrop-filter: blur(4px);
  }
</style>
</head>
<body>

<div class="hero" id="hero">

  <!-- BACK layer: blurred, moves more, opposite direction -->
  <div class="layer layer-back" id="layerBack">
    <img src="/photos/sections/img_2309-lg.jpg" alt="">
  </div>

  <!-- FRONT layer: sharp, moves less, same direction as tilt -->
  <div class="layer layer-front" id="layerFront">
    <img src="/photos/sections/img_2309-lg.jpg" alt="">
  </div>

  <!-- Depth vignette -->
  <div class="vignette"></div>

  <!-- Editorial text -->
  <div class="hero-text" id="heroText">
    <div class="name">Ильдар</div>
    <div class="ampersand">&amp;</div>
    <div class="name">Екатерина</div>
    <div class="divider">
      <span class="divider-line"></span>
      <span class="divider-heart">♡</span>
      <span class="divider-line"></span>
    </div>
    <div class="date">29 августа 2026</div>
  </div>

</div>

<!-- iOS gyro permission button -->
<button id="gyro-btn">Включить эффект</button>

<!-- Demo badge -->
<div class="demo-badge">ДЕМО · гиро-параллакс (заглушка без depth-map)</div>

<script>
(function () {
  'use strict';

  // ── Layer references ────────────────────────────────────────────
  const layerBack = document.getElementById('layerBack');
  const layerFront = document.getElementById('layerFront');
  const heroText = document.getElementById('heroText');
  const gyroBtn = document.getElementById('gyro-btn');

  // ── Motion targets (normalized -1 to 1) ─────────────────────────
  let targetX = 0;
  let targetY = 0;

  // ── Smoothed current values ──────────────────────────────────────
  let currentX = 0;
  let currentY = 0;

  // ── Translation limits (% of layer size) ────────────────────────
  // Layers are oversized by ~8% on each side, so we can safely
  // translate up to ~5% without showing empty edges.
  const BACK_MAX = 4.5;   // % — back moves MORE
  const FRONT_MAX = 2.0;  // % — front moves LESS
  const TEXT_MAX = 0.8;   // % — text moves very slightly (opposite)

  const LERP = 0.08;

  // ── Clamp helper ─────────────────────────────────────────────────
  function clamp(v, min, max) {
    return Math.max(min, Math.min(max, v));
  }

  // ── Apply transforms ─────────────────────────────────────────────
  function applyTransforms(cx, cy) {
    // Back: moves opposite to tilt, larger range
    const bx = clamp(-cx * BACK_MAX, -BACK_MAX, BACK_MAX);
    const by = clamp(-cy * BACK_MAX, -BACK_MAX, BACK_MAX);
    layerBack.style.transform = `translate(${bx}%, ${by}%)`;

    // Front: moves same direction as tilt (forward layer follows finger)
    const fx = clamp(cx * FRONT_MAX, -FRONT_MAX, FRONT_MAX);
    const fy = clamp(cy * FRONT_MAX, -FRONT_MAX, FRONT_MAX);
    layerFront.style.transform = `translate(${fx}%, ${fy}%)`;

    // Text: very slight opposite shift for floating depth feel
    const tx = clamp(-cx * TEXT_MAX, -TEXT_MAX, TEXT_MAX);
    const ty = clamp(-cy * TEXT_MAX, -TEXT_MAX, TEXT_MAX);
    heroText.style.transform = `translate(${tx}%, ${ty}%)`;
  }

  // ── RAF loop ──────────────────────────────────────────────────────
  function tick() {
    currentX += (targetX - currentX) * LERP;
    currentY += (targetY - currentY) * LERP;
    applyTransforms(currentX, currentY);
    requestAnimationFrame(tick);
  }
  requestAnimationFrame(tick);

  // ── Desktop: pointermove ──────────────────────────────────────────
  function initPointer() {
    window.addEventListener('pointermove', function (e) {
      const vw = window.innerWidth;
      const vh = window.innerHeight;
      targetX = clamp((e.clientX - vw / 2) / (vw / 2), -1, 1);
      targetY = clamp((e.clientY - vh / 2) / (vh / 2), -1, 1);
    });
  }

  // ── Mobile: deviceorientation ─────────────────────────────────────
  function handleOrientation(e) {
    // gamma = left/right tilt (-90 to 90), beta = front/back tilt (-180 to 180)
    const gamma = e.gamma || 0;
    const beta  = e.beta  || 0;
    targetX = clamp(gamma / 30, -1, 1);
    targetY = clamp((beta - 45) / 30, -1, 1); // 45° is natural phone hold angle
  }

  function subscribeOrientation() {
    window.addEventListener('deviceorientation', handleOrientation, true);
  }

  // ── Input routing ─────────────────────────────────────────────────
  // pointer:fine = mouse/trackpad → desktop path
  // otherwise try gyro
  const isFinePointer = window.matchMedia('(pointer: fine)').matches;

  if (isFinePointer) {
    initPointer();
  } else {
    // Mobile path
    if (
      typeof DeviceOrientationEvent !== 'undefined' &&
      typeof DeviceOrientationEvent.requestPermission === 'function'
    ) {
      // iOS 13+ — need explicit permission
      gyroBtn.style.display = 'block';
      gyroBtn.addEventListener('click', function () {
        DeviceOrientationEvent.requestPermission()
          .then(function (state) {
            if (state === 'granted') {
              subscribeOrientation();
            }
            gyroBtn.style.display = 'none';
          })
          .catch(function () {
            gyroBtn.style.display = 'none';
          });
      });
    } else if (typeof DeviceOrientationEvent !== 'undefined') {
      // Android / non-permission browsers — subscribe directly
      subscribeOrientation();
    } else {
      // Fallback: also listen to pointermove (touch drag won't fire it, but be safe)
      initPointer();
    }
  }

})();
</script>
</body>
</html>
